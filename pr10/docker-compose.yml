version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./jobs.db"
      REDIS_URL: "redis://redis:6379"
      API_KEY: "secret-key-123"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared_db:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  email-worker:
    build: ./services/email-worker
    ports:
      - "9090:9090"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./jobs.db"
      REDIS_URL: "redis://redis:6379"
      SMTP_HOST: "smtp.yandex.ru"
      SMTP_PORT: "465"
      SMTP_USER: ""
      SMTP_PASS: ""
      METRICS_PORT: "9090"
    depends_on:
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    volumes:
      - shared_db:/app

volumes:
  shared_db:
