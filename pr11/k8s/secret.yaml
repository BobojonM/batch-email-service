apiVersion: v1
kind: Secret
metadata:
  name: batch-email-secret
  namespace: default
type: Opaque
# Значения закодированы в base64:
# echo -n 'secret-key-123' | base64  -> c2VjcmV0LWtleS0xMjM=
# echo -n 'your-smtp-user' | base64  -> eW91ci1zbXRwLXVzZXI=
# echo -n 'your-smtp-pass' | base64  -> eW91ci1zbXRwLXBhc3M=
data:
  API_KEY: c2VjcmV0LWtleS0xMjM=
  SMTP_USER: eW91ci1zbXRwLXVzZXI=
  SMTP_PASS: eW91ci1zbXRwLXBhc3M=
