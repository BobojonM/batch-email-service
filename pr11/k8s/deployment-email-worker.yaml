apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: default
  labels:
    app: email-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-worker
  template:
    metadata:
      labels:
        app: email-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: email-worker
          image: batch-email-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: batch-email-config
          env:
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: batch-email-secret
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: batch-email-secret
                  key: SMTP_PASS
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
